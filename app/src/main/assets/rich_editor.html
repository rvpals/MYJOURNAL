<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 15px;
}
#editor-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}
.ql-toolbar.ql-snow {
    border: none !important;
    border-bottom: 1px solid #555 !important;
    flex-shrink: 0;
}
.ql-container.ql-snow {
    border: none !important;
    flex: 1;
    overflow-y: auto;
}
.ql-editor {
    min-height: 100%;
    font-size: 15px;
    line-height: 1.6;
    padding: 12px;
}
.ql-editor.ql-blank::before {
    font-style: italic;
}
.ql-snow .ql-stroke { stroke: var(--text) !important; }
.ql-snow .ql-fill { fill: var(--text) !important; }
.ql-snow .ql-picker-label { color: var(--text) !important; }
.ql-snow .ql-picker-options {
    background-color: var(--card-bg) !important;
    border-color: var(--border) !important;
}
.ql-snow .ql-picker-item { color: var(--text) !important; }
.ql-snow .ql-active .ql-stroke { stroke: var(--accent) !important; }
.ql-snow .ql-active .ql-fill { fill: var(--accent) !important; }
.ql-snow .ql-active { color: var(--accent) !important; }
.ql-snow .ql-picker-label.ql-active { color: var(--accent) !important; }
.ql-editor img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    margin: 4px 0;
}
.ql-editor table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
}
.ql-editor td, .ql-editor th {
    border: 1px solid var(--border);
    padding: 6px 8px;
}
</style>
</head>
<body>
<div id="editor-container">
    <div id="toolbar"></div>
    <div id="editor"></div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
function applyTheme(bg, cardBg, text, textSecondary, accent, border, inputBg) {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--card-bg', cardBg);
    document.documentElement.style.setProperty('--text', text);
    document.documentElement.style.setProperty('--text-secondary', textSecondary);
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--border', border);
    document.documentElement.style.setProperty('--input-bg', inputBg);
    document.body.style.backgroundColor = bg;
    document.body.style.color = text;
    var toolbar = document.querySelector('.ql-toolbar');
    if (toolbar) {
        toolbar.style.backgroundColor = cardBg;
    }
    var editor = document.querySelector('.ql-editor');
    if (editor) {
        editor.style.backgroundColor = inputBg;
        editor.style.color = text;
    }
}

var quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Paste or type rich content here...',
    modules: {
        toolbar: [
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'header': [1, 2, 3, false] }],
            [{ 'size': ['small', false, 'large', 'huge'] }],
            [{ 'list': 'ordered' }, { 'list': 'bullet' }],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'align': [] }],
            ['link', 'image'],
            ['clean']
        ]
    }
});

function setContent(html) {
    quill.root.innerHTML = html;
}

function getContent() {
    return quill.root.innerHTML;
}

function setPlainText(text) {
    quill.setText(text);
}
</script>
</body>
</html>
